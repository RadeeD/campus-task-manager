<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusTask</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
</head>
<body>

<div id="theme-flash"></div>

<button id="sidebarToggle" aria-label="Toggle sidebar">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
    <div>
      <div class="logo">
        <div class="logo-mark">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">CampusTask</span>
      </div>

      <nav>
        <a class="nav active">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M1 1h5v5H1V1zm8 0h5v5H9V1zM1 9h5v5H1V9zm8 0h5v5H9V9z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg>
          Dashboard
          <span class="nav-badge">7</span>
        </a>
        <a class="nav">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M3 2h9a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.25"/><path d="M5 6h5M5 8.5h3" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
          Tasks
        </a>
        <a class="nav">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="12" rx="1.5" stroke="currentColor" stroke-width="1.25"/><path d="M1 6h13M5 1v2M10 1v2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
          Calendar
        </a>
        <a class="nav">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M2 13V9m3.5 4V7M9 13V5m3.5 8V2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
          Analytics
        </a>
        <a class="nav">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.25"/><path d="M7.5 1v1.5M7.5 12.5V14M14 7.5h-1.5M2.5 7.5H1m10.3-5.8-1.1 1.1M4.3 10.7l-1.1 1.1M11.3 11.3l-1.1-1.1M4.3 4.3 3.2 3.2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
          Settings
        </a>
      </nav>
    </div>

    <div style="display:flex;flex-direction:column;gap:4px">
      <button id="themeBtn">
        <!-- icon injected by JS -->
        <svg class="theme-icon" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1.5M7.5 12.5V14M14 7.5h-1.5M2.5 7.5H1m10.3-5.8-1.1 1.1M4.3 10.7l-1.1 1.1M11.3 11.3l-1.1-1.1M4.3 4.3 3.2 3.2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.25"/></svg>
        <span id="themeBtnLabel">Light Mode</span>
      </button>
      <button id="logoutBtn">
      <svg width="13" height="13" viewBox="0 0 15 15" fill="none"><path d="M6 2H3a1 1 0 00-1 1v9a1 1 0 001 1h3M10 10l3-2.5L10 5M5 7.5h8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Sign out
    </button>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainScroll">
    <div class="main-inner">

      <!-- Topbar -->
      <header class="topbar">
        <p id="greeting" class="greeting-text">Halo 👋</p>
        <div class="topbar-bottom">
          <h1 class="page-title">Dashboard</h1>
          <button class="add-task-btn">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            New Task
          </button>
        </div>
      </header>

      <!-- Deadline -->
      <section class="deadline-section">
        <div id="deadlineCard" class="deadline-card">
          <div class="deadline-card-inner">
            <span class="deadline-label">Deadline terdekat</span>
            <h3 class="deadline-title">Loading...</h3>
            <p class="deadline-course">Loading...</p>
          </div>
          <div class="deadline-countdown-wrap">
            <span class="countdown-label">Waktu tersisa</span>
            <h2 id="countdown" class="countdown-value">—</h2>
          </div>
        </div>
      </section>

      <!-- Stats -->
      <section>
        <div id="stats" class="stats-grid"></div>
      </section>

      <!-- Tasks -->
      <section class="tasks-section">
        <div class="section-header">
          <h2 class="section-title">My Tasks</h2>
        </div>

        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/>
              <path d="M9 9l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Cari tugas…" />
          </div>
          <select id="sortSelect">
            <option value="deadline-asc">Deadline Terdekat</option>
            <option value="deadline-desc">Deadline Terjauh</option>
            <option value="priority-high">Prioritas Tertinggi</option>
            <option value="priority-low">Prioritas Terendah</option>
            <option value="name-asc">Nama A-Z</option>
            <option value="name-desc">Nama Z-A</option>
          </select>
          <select id="priorityFilter">
            <option value="">Semua Prioritas</option>
            <option value="Tinggi">Tinggi</option>
            <option value="Sedang">Sedang</option>
            <option value="Rendah">Rendah</option>
          </select>
          <select id="statusFilter">
            <option value="">Semua Status</option>
            <option value="Belum Dikerjakan">Belum Dikerjakan</option>
            <option value="Sedang Dikerjakan">Sedang Dikerjakan</option>
            <option value="Selesai">Selesai</option>
          </select>
        </div>

        <div id="tasks"></div>
      </section>

    </div>
  </main>
</div>

<!-- MODAL -->
<div id="taskModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">New Task</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <form id="taskForm">
      <input type="hidden" id="taskId" />

      <div class="form-group">
        <label>Mata Kuliah</label>
        <input type="text" id="mataKuliah" placeholder="e.g. Algoritma & Pemrograman" required />
      </div>

      <div class="form-group">
        <label>Nama Tugas</label>
        <input type="text" id="namaTugas" placeholder="e.g. Tugas 3 — Sorting" required />
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="deskripsi" placeholder="Tambahkan catatan…" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Dosen</label>
          <input type="text" id="dosen" placeholder="Nama dosen" />
        </div>
        <div class="form-group">
          <label>Prioritas</label>
          <select id="prioritas">
            <option>Rendah</option>
            <option>Sedang</option>
            <option>Tinggi</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Deadline</label>
        <input type="datetime-local" id="deadline" required />
      </div>

      <button type="submit" class="submit-btn">Save Task</button>
    </form>
  </div>
</div>

<div id="toast"></div>

<script src="js/dashboard.js"></script>
</body>
</html>
